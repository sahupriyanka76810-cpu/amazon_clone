<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Amazon Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Navbar -->
<div class="navbar">
    <div class="logo">amazon</div>
    <div class="search">
        <input type="text" placeholder="Search products">
        <button>🔍</button>
    </div>
    <div class="nav-right">
        <p>Hello, Sign in</p>
        <p>Returns & Orders</p>
        <p>Cart 🛒</p>
    </div>
</div>

<!-- Hero Section -->
<div class="hero">
    <h1>Great Deals on Top Products</h1>
</div>

<!-- Product Section -->
<div class="products">

    <div class="card">
        <img src="https://picsum.photos/200?1">
        <h3>Headphones</h3>
        <p>₹1,299</p>
        <button>Add to Cart</button>
    </div>

    <div class="card">
        <img src="https://picsum.photos/200?2">
        <h3>Shoes</h3>
        <p>₹2,499</p>
        <button>Add to Cart</button>
    </div>

    <div class="card">
        <img src="https://picsum.photos/200?3">
        <h3>Watch</h3>
        <p>₹999</p>
        <button>Add to Cart</button>
    </div>

    <div class="card">
        <img src="https://picsum.photos/200?4">
        <h3>Bag</h3>
        <p>₹799</p>
        <button>Add to Cart</button>
    </div>

</div>

<!-- Footer -->
<footer>
    <p>© 2026 Amazon Clone | Made by You 💙</p>
</footer>

</body>
</html>
